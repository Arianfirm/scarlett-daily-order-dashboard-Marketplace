
name: Update Scarlett Dashboard

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install pandas requests openpyxl

      - name: Run Dashboard Update
        env:
          ACHANTO_EMAIL: ${{ secrets.ACHANTO_EMAIL }}
          ACHANTO_PASSWORD: ${{ secrets.ACHANTO_PASSWORD }}
        run: |
          python update_dashboard.py

      - name: Commit Updated JSON
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add data/orders.json

          git commit -m "Auto update dashboard" || echo "No changes"

          git push
