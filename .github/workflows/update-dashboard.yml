name: Update Scarlett Dashboard

on:
  schedule:
    - cron: '0 * * * *'   # tiap jam: 00:00, 01:00, 02:00, dst (UTC)
  workflow_dispatch:        # tetap bisa trigger manual

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests openpyxl

      - name: Run Dashboard Update
        env:
          ACHANTO_EMAIL:    ${{ secrets.ACHANTO_EMAIL }}
          ACHANTO_PASSWORD: ${{ secrets.ACHANTO_PASSWORD }}
        run: python update_dashboard.py

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/orders.csv data/last_updated.json data/history/ data/inventory.xlsx
          git diff --staged --quiet || git commit -m "chore: update data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
